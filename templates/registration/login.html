<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Georgia, serif;
      background: #f7f3eb;
      color: #333;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 90%;
      max-width: 380px;
      background: white;
      padding: 45px 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    h1 {
      font-size: 1.8rem;
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #777;
      font-size: 0.95rem;
      text-align: center;
      margin-bottom: 30px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-family: Georgia, serif;
      font-size: 1rem;
      margin-bottom: 18px;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #4a5d4f;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      background: #4a5d4f;
      color: white;
      border: none;
      font-family: Georgia, serif;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #39473d;
    }

    .errorlist {
      list-style: none;
      background: #fbeae7;
      color: #c0392b;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 0.85rem;
      margin-bottom: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to track your routine</p>

    <form method="post">
      {% csrf_token %}
      {% if form.non_field_errors %}
        <ul class="errorlist">
          {% for error in form.non_field_errors %}
            <li>{{ error }}</li>
          {% endfor %}
        </ul>
      {% endif %}

      <label for="id_username">Username</label>
      {{ form.username }}

      <label for="id_password">Password</label>
      {{ form.password }}

      <button type="submit">Sign In</button>
      <input type="hidden" name="next" value="{{ next }}">
    </form>
  </div>
</body>
</html>
